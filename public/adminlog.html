<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title> Login Form </title>
    <link rel="stylesheet" href="./css/adminlog.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <form method="GET" action="insert">
            <h1>Login</h1>
            <div class="input-box" >
                <input type="email" name="email" placeholder="Email-ID" id="email" required>
                <div style="padding-left:15px; padding-top:5px;"><i class="bx bxs-user"></i></div>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="Password" id="password" required>
                <div style="padding-left:15px;padding-top:5px;"><i class="bx bxs-lock-alt"></i></div>
            </div>
            <input type="submit" class="btn" onclick="npg()"  value="Login">
           
        </form>
        
    </div>
    <button class="left-corner-button" onclick="nxt()">Home</button>
   
    <script>           
        function nxt(){
            window.location.assign("homepage.html");
        }
        function npg(){
            window.location.assign("admindash.html");
        }
        function auth(){
            var email= document.getElementById("email").value;
            var password= document.getElementById("password").value
            if(email == "regina@gmail.com")
            {
                if(password == "regi")
                {
                window.location.assign("admindash.html");
                alert("login Sucessfull");
                }
            }
            else{
                window.location.assign("adminlog.html")
                alert("Invalid User");
                return;
            }
        }
    </script>
</body>
</html>
