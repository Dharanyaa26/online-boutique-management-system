<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title> Login Form </title>
    <link rel="stylesheet" href="./css/style1.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <form method="GET" action="insert">
            <h1>Login</h1>
            <div class="input-box" >
                <input type="email" name="email" placeholder="Email-ID" id="email" required>
                <div style="padding-left:15px; padding-top:5px;"><i class="bx bxs-user"></i></div>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="Password" id="password" required>
                <div style="padding-left:15px;padding-top:5px;"><i class="bx bxs-lock-alt"></i></div>
            </div>
            <div class="remember-forget">
                <label><input type="checkbox">Remember me</label>
                <a href="forget_pass.html">Forget password?</a>
            </div>
            <input type="submit" class="btn" value="Login">
            <div class="register-link">
                <p>Don't have an account? <a href="#" onclick="nx()">
                Register</a></p>
            </div>
        </form>
        
    </div>
    <button class="left-corner-button" onclick="nxt()">Home</button>
    <button class="top-corner-button" onclick="nxs()">Delete</button>
    <script>
        function nx(){
            window.location.assign("registrationindex.html");
        }
        function nxs(){
            window.location.assign("delete.html");
        }
        function nxt(){
            window.location.assign("homepage.html");
        }
    </script>
</body>
</html>
