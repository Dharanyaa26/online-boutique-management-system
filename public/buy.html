<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping</title>
    <link rel="stylesheet" href="./css/buy.css">
    <script>
        function nxt(){
            window.location.assign("dress.html");
        }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Happy shopping!</h1>
            <div class="shopping">
                <img src="img/shopping.svg">
                <span class="quantity">0</span>
            </div>
        </header>
        <div class="list"></div>
    </div>
    <div class="card">
        <h1>Card</h1>
        <ul class="listCard"></ul>
        <div class="checkout">
            <div class="total">0</div>
            <div class="closeShopping">Close</div>   
        </div>
    </div>
    <script src="./js/buy.js"></script>
    <button class="left-corner-button" onclick="nxt()">Home</button>
</body>
</html>
