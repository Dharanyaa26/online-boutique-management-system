<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="./css/cstyle.css">
    <script>
    function nxt(){
        window.location.assign("homepage.html");
    }
    </script>

</head>
<body>
    <div class="contact-container">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-left">
            <div class="contact-left-title">
                <h2>Get in touch</h2>
                <hr>
            </div>
            <input type="hidden" name="access_key" value="83c1b125-aa86-4da9-9930-998338149c62">
            <input type="text" name="name" placeholder="Your Name" class="contact-inputs" required>
            <input type="email" name="email" placeholder="Your Email-ID" class="contact-inputs" required>
            <textarea name="message" placeholder="Your Message" class="contact-inputs" required></textarea>
            <button type="submit">submit <img src="img/right-arrow-alt-regular-24.png"></button>
            <button class="left-corner-button" onclick="nxt()">Home</button>
        </form>
        <div class="contact-right">
            <img src="./img/img3.webp" >
        </div>
    </div>
</body>
</html>
